<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Estoque</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/estoque/css/base.css?v=20260304">
  <link rel="stylesheet" href="/estoque/css/login.css?v=20260304">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow p-4" style="max-width: 420px; width: 100%;">
    <h3 class="text-center mb-3">🔐 Login no Sistema</h3>
    <p class="text-center text-muted mb-4" style="font-size: 0.95rem;">
      Entre para acessar o estoque.
    </p>

    <form id="formLogin" novalidate>
      <div class="mb-3">
        <label for="login" class="form-label">Usuário ou E-mail</label>
        <input
          type="text"
          class="form-control"
          id="login"
          name="login"
          autocomplete="username"
          required
        >
      </div>

      <div class="mb-3">
        <label for="senha" class="form-label">Senha</label>
        <input
          type="password"
          class="form-control"
          id="senha"
          name="senha"
          autocomplete="current-password"
          required
        >
      </div>

      <button id="btnEntrar" type="submit" class="btn btn-primary w-100 fw-bold">
        Entrar
      </button>

      <div id="msgErro" class="alert alert-danger mt-3 d-none mb-0" role="alert"></div>
      <div class="text-center mt-3">
        <small class="text-muted">Dica: se algo “não atualizar”, use Ctrl+F5.</small>
      </div>
    </form>
  </div>

  <script type="module" src="/estoque/js/login.js?v=20260304"></script>
</body>
</html>
