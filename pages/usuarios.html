<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Usuários</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/estoque/css/base.css?v=20260309-user2">
  <link rel="stylesheet" href="/estoque/css/layout.css?v=20260309-user2">
  <link rel="stylesheet" href="/estoque/css/usuarios.css?v=20260309-user2">
</head>

<body>
  <div id="navbar"></div>

  <div class="app-shell">
    <aside id="sidebar" class="app-sidebar d-none"></aside>

    <main class="app-content">
      <div class="page-head mb-4">
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <div class="page-icon">👤</div>
          <div>
            <h1 class="page-title mb-0">Usuários</h1>
          </div>
        </div>

        <div class="d-flex gap-2 mt-3 mt-lg-0 flex-wrap">
          <button id="btnNovoUsuario" class="btn btn-primary" type="button">
            ➕ Novo usuário
          </button>
        </div>
      </div>

      <section class="card p-3 mb-4">
        <div class="row g-2 align-items-center">
          <div class="col-12 col-lg-8">
            <div class="input-group">
              <span class="input-group-text">🔎</span>
              <input
                id="buscaUsuario"
                class="form-control"
                placeholder="Buscar por nome ou e-mail..."
                autocomplete="off"
              >
              <button id="btnLimparBuscaUsuario" class="btn btn-outline-secondary" type="button">
                Limpar
              </button>
            </div>
          </div>

          <div class="col-12 col-lg-4 d-flex justify-content-lg-end gap-2 flex-wrap">
            <button id="btnAtualizarUsuarios" class="btn btn-outline-primary" type="button">
              🔄 Atualizar
            </button>
          </div>
        </div>
      </section>

      <section class="card p-3 mb-4" id="usuariosAvisoRestrito">
        <div class="alert alert-warning mb-0">
          Esta área é destinada ao gerenciamento de usuários e é acessível apenas para administradores.
        </div>
      </section>

      <section class="card p-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
          <h5 class="mb-0">Usuários cadastrados</h5>
          <small class="text-muted" id="usuariosStatusTopo">Carregando...</small>
        </div>

        <div class="table-responsive">
          <table class="table table-striped table-bordered align-middle mb-0">
            <thead>
              <tr>
                <th style="width: 90px;">ID</th>
                <th>Nome</th>
                <th>E-mail</th>
                <th style="width: 140px;">Nível</th>
                <th style="width: 160px;">Criado em</th>
                <th style="width: 140px;">Ações</th>
              </tr>
            </thead>
            <tbody id="tabelaUsuarios">
              <tr>
                <td colspan="6" class="text-center text-muted">
                  Carregando...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="modal fade" id="modalUsuario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h5 class="modal-title mb-0" id="tituloModalUsuario">Novo usuário</h5>
            <small class="text-muted" id="subtituloModalUsuario">Preencha os dados para salvar o usuário.</small>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>

        <div class="modal-body">
          <input type="hidden" id="usuarioId">

          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">Nome</label>
              <input id="usuarioNome" class="form-control" placeholder="Nome do usuário...">
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">E-mail</label>
              <input id="usuarioEmail" type="email" class="form-control" placeholder="usuario@empresa.com">
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Nível</label>
              <select id="usuarioNivel" class="form-select">
                <option value="operador">Operador</option>
                <option value="admin">Admin</option>
              </select>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" id="labelSenhaUsuario">Senha</label>
              <input id="usuarioSenha" type="password" class="form-control" placeholder="Digite a senha...">
              <div class="form-text" id="usuarioSenhaHint">
                A senha é obrigatória no cadastro.
              </div>
            </div>
          </div>

          <div class="mt-3">
            <div class="small text-muted" id="usuarioStatus"></div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Cancelar
          </button>
          <button type="button" class="btn btn-primary" id="btnSalvarUsuario">
            Salvar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="/estoque/js/api.js?v=20260309-user2"></script>
  <script type="module" src="/estoque/js/logout.js?v=20260309-user2"></script>
  <script type="module" src="/estoque/js/main.js?v=20260309-user2"></script>
  <script type="module" src="/estoque/js/usuarios.js?v=20260309-user2"></script>
</body>
</html>
