<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Movimentações</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/estoque/css/base.css?v=20260308-mov">
  <link rel="stylesheet" href="/estoque/css/layout.css?v=20260308-mov">
</head>

<body>
  <div id="navbar"></div>

  <div class="app-shell">
    <aside id="sidebar" class="app-sidebar d-none"></aside>

    <main class="app-content">
      <div class="page-head mb-4">
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <div class="page-icon">🔄</div>
          <div>
            <h1 class="page-title mb-0">Movimentações</h1>
          </div>
        </div>
      </div>

      <section class="card p-3 mb-4">
        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-6 col-xl-3">
            <label class="form-label">Produto</label>
            <input
              type="text"
              id="filtroProduto"
              class="form-control"
              placeholder="Nome do produto..."
              autocomplete="off"
            >
          </div>

          <div class="col-12 col-md-6 col-xl-2">
            <label class="form-label">Tipo</label>
            <select id="filtroTipo" class="form-select">
              <option value="">Todos</option>
              <option value="entrada">Entrada</option>
              <option value="saida">Saída</option>
              <option value="remocao">Remoção</option>
            </select>
          </div>

          <div class="col-12 col-md-6 col-xl-2">
            <label class="form-label">Data início</label>
            <input type="date" id="filtroDataInicio" class="form-control">
          </div>

          <div class="col-12 col-md-6 col-xl-2">
            <label class="form-label">Data fim</label>
            <input type="date" id="filtroDataFim" class="form-control">
          </div>

          <div class="col-12 col-xl-3">
            <div class="d-flex gap-2 flex-wrap">
              <button id="btnBuscarMovimentacoes" class="btn btn-primary" type="button">
                Buscar
              </button>
              <button id="btnLimparMovimentacoes" class="btn btn-outline-secondary" type="button">
                Limpar
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="card p-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
          <h5 class="mb-0">Histórico de movimentações</h5>
          <small class="text-muted" id="movimentacoesInfoTopo">
            Use os filtros para consultar.
          </small>
        </div>

        <div class="table-responsive" id="tabelaMovimentacoes">
          <table class="table table-striped table-bordered align-middle mb-0">
            <thead>
              <tr>
                <th style="width: 90px;">ID</th>
                <th>Produto</th>
                <th style="width: 120px;">Tipo</th>
                <th style="width: 110px;">Qtd</th>
                <th style="width: 170px;">Data</th>
                <th style="width: 180px;">Usuário</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="6" class="text-center text-muted">
                  Use os filtros para buscar movimentações.
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-3">
          <small class="text-muted" id="movimentacoesStatusRodape"></small>

          <div class="d-flex gap-2">
            <button id="btnPaginaAnterior" class="btn btn-outline-secondary btn-sm" type="button">
              ← Anterior
            </button>
            <button id="btnPaginaProxima" class="btn btn-outline-secondary btn-sm" type="button">
              Próxima →
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="/estoque/js/api.js?v=20260308-mov"></script>
  <script type="module" src="/estoque/js/logout.js?v=20260308-mov"></script>
  <script type="module" src="/estoque/js/main.js?v=20260308-mov"></script>
  <script type="module" src="/estoque/js/movimentacoes.js?v=20260308-mov"></script>
</body>
</html>
