<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/estoque/css/base.css?v=20260313a">
  <link rel="stylesheet" href="/estoque/css/layout.css?v=20260313a">
  <link rel="stylesheet" href="/estoque/css/dashboard.css?v=20260313a">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="navbar"></div>

<div class="app-shell">

  <aside id="sidebar" class="app-sidebar d-none"></aside>

  <main class="app-content">

    <!-- Cabeçalho -->
    <div class="page-head mb-4">

      <div class="d-flex align-items-center gap-3 flex-wrap">

        <div class="page-icon">📊</div>

        <div>
          <h1 class="page-title mb-0">Dashboard</h1>
          <div class="text-muted small">
            Visão geral do sistema de estoque.
          </div>
        </div>

      </div>

    </div>

    <!-- KPIs -->
    <section class="row g-3 mb-4">

      <div class="col-12 col-md-6 col-xl-3">

        <div class="card dashboard-kpi-card h-100">

          <div class="card-body">

            <div class="dashboard-kpi-label">
              Produtos ativos
            </div>

            <div class="dashboard-kpi-value" id="kpiProdutos">
              0
            </div>

          </div>

        </div>

      </div>

      <div class="col-12 col-md-6 col-xl-3">

        <div class="card dashboard-kpi-card h-100">

          <div class="card-body">

            <div class="dashboard-kpi-label">
              Movimentações
            </div>

            <div class="dashboard-kpi-value" id="kpiMovimentacoes">
              0
            </div>

          </div>

        </div>

      </div>

      <div class="col-12 col-md-6 col-xl-3">

        <div class="card dashboard-kpi-card h-100 dashboard-kpi-faturamento">

          <div class="card-body">

            <div class="dashboard-kpi-label">
              Faturamento
            </div>

            <div class="dashboard-kpi-value" id="kpiFaturamento">
              R$ 0,00
            </div>

          </div>

        </div>

      </div>

      <div class="col-12 col-md-6 col-xl-3">

        <div class="card dashboard-kpi-card h-100 dashboard-kpi-lucro">

          <div class="card-body">

            <div class="dashboard-kpi-label">
              Lucro
            </div>

            <div class="dashboard-kpi-value" id="kpiLucro">
              R$ 0,00
            </div>

          </div>

        </div>

      </div>

    </section>

    <!-- Gráfico + ranking -->
    <section class="row g-3">

      <!-- Gráfico -->
      <div class="col-12 col-xl-8">

        <div class="card dashboard-chart-card">

          <div class="card-body">

            <h5 class="mb-3">
              Movimentações (últimos 30 dias)
            </h5>

            <canvas id="graficoMovimentacoes"></canvas>

          </div>

        </div>

      </div>

      <!-- Ranking -->
      <div class="col-12 col-xl-4">

        <div class="card dashboard-ranking-card">

          <div class="card-body">

            <h5 class="mb-3">
              Produtos mais vendidos
            </h5>

            <div id="rankingProdutos">

              <div class="text-muted small">
                Carregando...
              </div>

            </div>

          </div>

        </div>

      </div>

    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="/estoque/js/api.js?v=20260313a"></script>
<script type="module" src="/estoque/js/logout.js?v=20260313a"></script>
<script type="module" src="/estoque/js/main.js?v=20260313a"></script>
<script type="module" src="/estoque/js/dashboard.js?v=20260313a"></script>

</body>
</html>
