<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Home - Estoque</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/estoque/css/base.css?v=20260308-home2">
  <link rel="stylesheet" href="/estoque/css/layout.css?v=20260308-home2">
  <link rel="stylesheet" href="/estoque/css/home.css?v=20260308-home2">
</head>

<body>
  <div id="navbar"></div>

  <div class="app-shell">
    <aside id="sidebar" class="app-sidebar d-none"></aside>

    <main class="app-content">
      <div class="page-head mb-4">
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <div class="page-icon">🏠</div>
          <div>
            <h1 class="page-title mb-0">Home</h1>
          </div>
        </div>
      </div>

      <section class="home-hero card border-0">
        <div class="home-hero-inner">
          <div class="home-hero-content">
            <div class="home-saudar-box">
              <div class="home-saudar-label">Bem-vindo ao sistema</div>
              <h2 class="home-title" id="homeSaudacao">Olá.</h2>
            </div>

            <div class="home-quote-card">
              <div class="home-quote-loading" id="homeLoading">
                Carregando frase e imagem...
              </div>

              <figure class="home-quote-box d-none" id="homeConteudo">
                <blockquote class="home-quote-text" id="homeFrase">
                  “”
                </blockquote>
                <figcaption class="home-quote-author" id="homeAutor"></figcaption>
              </figure>

              <div class="home-quote-error d-none" id="homeErro">
                Não foi possível carregar o conteúdo da Home.
              </div>
            </div>
          </div>

          <div class="home-hero-media">
            <div class="home-image-frame">
              <img
                id="homeImagem"
                class="home-image d-none"
                alt="Imagem da página inicial"
              >
              <div class="home-image-placeholder d-none" id="homeImagemPlaceholder">
                Imagem da Home
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="/estoque/js/api.js?v=20260308-home2"></script>
  <script type="module" src="/estoque/js/logout.js?v=20260308-home2"></script>
  <script type="module" src="/estoque/js/main.js?v=20260308-home2"></script>
  <script type="module" src="/estoque/js/home.js?v=20260308-home2"></script>
</body>
</html>
